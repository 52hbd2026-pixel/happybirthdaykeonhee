<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keonhee'sBirthDay2026makeHp</title>
    <!-- font -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=Jua&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <!-- css -->
    <link rel="stylesheet" href="destyle.css">
    <link rel="stylesheet" href="party.css">
</head>
<body>
    <div class="firstView">
        <div class="topTxt">
            <p>Welcome to<br>Keonhee BirthDay Party!</p>
        </div>
        <img src="img/cake1.png" alt="" class="cakeFall" style="left: 10%; animation-delay: 0s; width: 20%;">
        <img src="img/cake1.png" alt="" class="cakeFall" style="left: 4%; animation-delay: 1.5s; width: 20%;">
        <img src="img/cake1.png" alt="" class="cakeFall" style="left: 70%; animation-delay: 0.8s; width: 20%;">
        <img src="img/cake1.png" alt="" class="cakeFall" style="left: 65%; animation-delay: 2.3s; width: 20%;">
        <img src="img/cake1.png" alt="" class="cakeFall" style="left: 15%; animation-delay: 3.0s; width: 20%;">
        <div class="scrolldown"><span>Scroll</span></div>
    </div>
    <div class="cloud">
        <img src="img/cloud.svg" alt="" class="cloudImg">
    </div>
    <div class="contents">
        <div class="uss">
            <img src="img/uss1.gif" alt="uss" class="uss52">
        </div>
        <div class="envelopeDiv">
            <img src="img/envelope_colsed.png" alt="envelope" class="envelope" id="envelopeImg">
        </div>
        <!-- modal -->
        <div class="modal2" id="modal2">
            <div class="letterset">
                <img class="letter" src="img/letter.png" alt="letter">
                <!-- close btn -->
                <span class="closeBtn" id="closeBtn"></span>
            </div>
        </div>
        
    </div>

    <script src="party.js"></script>
</body>
</html>
